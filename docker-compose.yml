services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meteo_db
      POSTGRES_USER: meteo_user
      POSTGRES_PASSWORD: meteo_pass_2026
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meteo_user -d meteo_db"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/meteo_db
      SPRING_DATASOURCE_USERNAME: meteo_user
      SPRING_DATASOURCE_PASSWORD: meteo_pass_2026
      APP_JWT_SECRET: MeteoProject2026SuperSecretKeyThatIsAtLeast256BitsLong!!
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost
      GROQ_API_KEY: ${GROQ_API_KEY}

  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [backend]

volumes:
  postgres_data:
